<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Image Carousel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* 캐러셀 컨테이너 (노션 임베드 블록 크기에 100% 맞춰집니다) */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 8px;
        }
        /* 이미지 슬라이드 전체를 감싸는 트랙 */
        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }
        /* 개별 슬라이드 */
        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 가로세로 비율 유지하며 노션 크기에 맞게 꽉 채움 */
            border-radius: 8px;
        }
        /* 이동 버튼 스타일 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
            user-select: none;
            z-index: 10;
        }
        .carousel-btn:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
        .btn-prev { left: 16px; }
        .btn-next { right: 16px; }

        /* 하단 점(인디케이터) */
        .carousel-indicators {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .indicator.active {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>

    <div class="carousel-container">
        <button class="carousel-btn btn-prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="carousel-btn btn-next" onclick="moveSlide(1)">&#10095;</button>

        <div class="carousel-track" id="carouselTrack"></div>
        <div class="carousel-indicators" id="indicators"></div>
    </div>

    <script>
        // 고정된 이미지 주소 리스트
        const images = [
            "https://i.postimg.cc/xCmBsJMv/1.png",
            "https://i.postimg.cc/x8ShBfP9/2.png",
            "https://i.postimg.cc/CLVp2ghv/jemog-eobsneun-dijain-(19).png"
        ];

        let currentIndex = 0;
        const track = document.getElementById('carouselTrack');
        const indicatorsContainer = document.getElementById('indicators');

        // 캐러셀 요소 초기 생성 및 에러 복구 완료
        function initCarousel() {
            images.forEach((src, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `<img src="${src}" alt="슬라이드 이미지 ${index + 1}" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Load+Error'">`;
                track.appendChild(slide);

                const indicator = document.createElement('div');
                indicator.className = `indicator ${index === 0 ? 'active' : ''}`;
                indicator.onclick = () => goToSlide(index);
                indicatorsContainer.appendChild(indicator);
            });
        }

        function updateSlidePosition() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            const indicators = document.querySelectorAll('.indicator');
            indicators.forEach((ind, index) => {
                if (index === currentIndex) {
                    ind.classList.add('active');
                } else {
                    ind.classList.remove('active');
                }
            });
        }

        function moveSlide(direction) {
            currentIndex += direction;
            if (currentIndex < 0) {
                currentIndex = images.length - 1;
            } else if (currentIndex >= images.length) {
                currentIndex = 0;
            }
            updateSlidePosition();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlidePosition();
        }

        // 캐러셀 로드 실행
        initCarousel();
    </script>
</body>
</html>
